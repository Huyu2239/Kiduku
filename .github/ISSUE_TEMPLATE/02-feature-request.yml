name: "機能提案"
description: "新機能・改善案の提案"
title: "[Feature] "
body:
  - type: markdown
    attributes:
      value: |
        解決したい課題と、期待する体験を中心に記載してください。
  - type: textarea
    id: problem
    attributes:
      label: 背景・課題
      description: 現在どんな問題があり、誰が困っているか。
      placeholder: 例) メンションが多いと重要通知を追いにくい
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 提案内容
      description: 具体的な解決案。
      placeholder: 例) 通知一覧に「期限切れのみ表示」フィルタを追加する
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 代替案・検討済み案
      description: 見送った案やトレードオフがあれば記載してください。
  - type: textarea
    id: acceptance
    attributes:
      label: 受け入れ条件
      description: 完了判定に使える条件を箇条書きで記載してください。
      placeholder: |
        - [ ] 条件1
        - [ ] 条件2
    validations:
      required: true
  - type: dropdown
    id: impact
    attributes:
      label: 想定インパクト
      options:
        - 高（多くのユーザー体験を改善）
        - 中（特定フローを改善）
        - 低（限定的な改善）
    validations:
      required: true
  - type: checkboxes
    id: checklist
    attributes:
      label: 事前確認
      options:
        - label: 既存Issue・既存仕様との差分を確認した
          required: true
        - label: スコープが大きい場合、段階リリース案を検討した
          required: false
