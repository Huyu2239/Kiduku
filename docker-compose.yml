services:
  postgres:
    image: postgres:16-alpine
    container_name: kiduku-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: kiduku
      POSTGRES_PASSWORD: kiduku
      POSTGRES_DB: kiduku
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init:/docker-entrypoint-initdb.d:ro

volumes:
  postgres_data:
